server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # Aggressive caching for hashed assets (Vite fingerprints JS/CSS)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache the HTML entry point
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback – send all unmatched routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Simple health-check endpoint (no file needed on disk)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                               always;
    add_header X-Content-Type-Options "nosniff"                                  always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy     "geolocation=(), camera=(), microphone=()" always;

    # Hide nginx version
    server_tokens off;
}
