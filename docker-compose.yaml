services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - target: 5432
        published: "${EXTERNAL_POSTGRES_PORT:-}"

  postgres-init:
    image: postgres:16
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-chatbot_secret}
    networks:
      - chatbot-network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      psql -h postgres
      -U ${POSTGRES_USER:-chatbot}
      -d ${POSTGRES_DB:-chatbot}
      -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
      -c "CREATE EXTENSION IF NOT EXISTS fuzzystrmatch;"
      -c "CREATE EXTENSION IF NOT EXISTS vector;"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot_secret}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-chatbot}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      postgres-init:
        condition: service_completed_successfully
        restart: true
      redis:
        condition: service_healthy
        restart: true
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - backend-uv-cache:/root/.cache/uv
      - agency-uploads:/app/uploads

  agent-proxy:
    build:
      context: ./agent-proxy
      target: production
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot_secret}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-chatbot}
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - agent-proxy-go-modules:/go/pkg/mod
      - agent-proxy-go-build-cache:/root/.cache/go-build

  frontend:
    build:
      context: ./frontend
      target: production
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-}"
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - frontend-pnpm-store:/pnpm/store

  nginx:
    image: nginx
    restart: unless-stopped
    environment:
      # Empty = plain HTTP only. Set to the public hostname to enable TLS once a
      # cert has been issued; see docs/tls.md.
      CERT_DOMAIN: ${CERT_DOMAIN:-}
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/routes.conf:/etc/nginx/routes.conf
      - ./nginx/tls.conf.template:/etc/nginx/tls.conf.template
      - ./nginx/tls.sh:/docker-entrypoint.d/40-tls.sh
      - letsencrypt:/etc/letsencrypt:ro
      - acme-challenge:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
        restart: true
      backend:
        condition: service_healthy
        restart: true
      agent-proxy:
        condition: service_healthy
        restart: true
      jaeger:
        condition: service_started
    networks:
      - chatbot-network
    ports:
      - target: 8080
        published: "${EXTERNAL_HTTP_PORT:-}"
      - target: 8443
        published: "${EXTERNAL_HTTPS_PORT:-}"

  # Renews every certificate in the letsencrypt volume twice a day (a no-op until
  # one is issued — see docs/tls.md for the first `certonly` run). nginx
  # picks up a renewed cert on its own; nothing here reloads it.
  certbot:
    image: certbot/certbot:v5.1.0
    restart: unless-stopped
    networks:
      - chatbot-network
    volumes:
      - letsencrypt:/etc/letsencrypt
      - acme-challenge:/var/www/certbot
    entrypoint: >
      sh -c 'trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

  jaeger:
    image: jaegertracing/jaeger:2.18.0
    restart: unless-stopped
    networks:
      - chatbot-network
    command:
      - "--set=extensions.jaeger_query.base_path=/jaeger"

volumes:
  postgres_data:
  backend-uv-cache:
  agency-uploads:
  agent-proxy-go-modules:
  agent-proxy-go-build-cache:
  frontend-pnpm-store:
  letsencrypt:
  acme-challenge:

networks:
  chatbot-network:
