services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./scripts/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}

        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - backend

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-thai_citizen}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-thai_citizen}
      DB_NAME: ${POSTGRES_DB:-thai_citizen}
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "8083:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thai_citizen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thai_citizen}
      POSTGRES_DB: ${POSTGRES_DB:-thai_citizen}
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: