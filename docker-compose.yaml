services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-chatbot}
      POSTGRES_USER:     ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # ports:
    #   - "9092:5432"

  backend:
    build:
      context: ./backend
      target: ${BUILD_TARGET:-production}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot_secret}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-chatbot}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      - postgres
    networks:
      - chatbot-network
    develop:
      watch:
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock
        - action: restart
          path: ./backend/migrations
          target: /app/migrations
        - action: sync
          path: ./backend/app
          target: /app/app         

  agent-proxy:
    build:
      context: ./agent-proxy
      target: ${BUILD_TARGET:-production}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot_secret}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-chatbot}
    depends_on:
      - postgres
    networks:
      - chatbot-network
    develop:
      watch:
        - action: sync+restart
          path: ./agent-proxy
          target: /app

  frontend:
    build:
      context: ./frontend
      target: ${BUILD_TARGET:-production}
    restart: unless-stopped
    networks:
      - chatbot-network
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: rebuild
          path: ./frontend/package.json

  nginx:
    image: nginx
    restart: unless-stopped
    volumes:
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
      - agent-proxy
      - otel-collector
      - zipkin
    networks:
      - chatbot-network
    ports:
      - "${PORT:-80}:80"

  otel-collector:
    image: otel/opentelemetry-collector
    restart: unless-stopped
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    networks:
      - chatbot-network

  zipkin:
    image: openzipkin/zipkin
    restart: unless-stopped
    networks:
      - chatbot-network

  tailscale:
    image: tailscale/tailscale:latest
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - tailscale:/var/lib/tailscale
      - ./serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    restart: unless-stopped
    networks:
      - chatbot-network

volumes:
  postgres_data:
  tailscale:

networks:
  chatbot-network:
