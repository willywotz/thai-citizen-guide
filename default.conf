# Gateway reverse proxy (container: nginx). Plain-HTTP server; the routing
# contract itself lives in routes.conf, shared with the TLS server.
#
# TLS is opt-in and self-enabling: set CERT_DOMAIN on the nginx service and issue
# a cert (see docs/tls.md). While no cert exists this stays a plain HTTP
# gateway; once /etc/letsencrypt/live/$CERT_DOMAIN exists, 40-tls.sh writes
# conf.d/tls.conf plus the redirect below. See nginx-tls.sh.

# A bare `Connection "upgrade"` on /api would break keep-alive for every ordinary
# API request, so the header is derived from the client's Upgrade header.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    # ACME HTTP-01 challenge, shared with the certbot container over the
    # acme-challenge volume. Must stay reachable over plain HTTP for renewals,
    # so it is exempted from the HTTPS redirect.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Empty until a cert exists, then a `return 301 https://...` for everything
    # but the ACME path. A no-match wildcard include is not an error.
    include /etc/nginx/redirect/*.conf;

    include /etc/nginx/routes.conf;
}
