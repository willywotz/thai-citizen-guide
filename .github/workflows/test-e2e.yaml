name: Test-E2E

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  # Role-access verification: brings up the full stack (production targets, no
  # override) and runs both the blackbox API sweep and the Playwright UI sweep
  # against it. The backend lifespan seeds the default admin + agencies on
  # startup, so no manual bootstrap is needed.
  blackbox-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 11.5.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22 }

      - name: Start app stack
        run: docker compose -f docker-compose.yaml up -d --build --wait --wait-timeout 300
        env:
          EXTERNAL_HTTP_PORT: "8080"

      - name: Wait for admin bootstrap
        env:
          ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: |
          for i in $(seq 1 30); do
            if curl -fsS -X POST http://localhost:8080/api/v1/auth/login \
                 -H 'Content-Type: application/json' \
                 -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}" >/dev/null 2>&1; then
              echo "admin account ready"; exit 0
            fi
            echo "waiting for admin bootstrap ($i)…"; sleep 5
          done
          echo "::error::admin account never became available"; exit 1

      - name: Blackbox API tests
        working-directory: blackbox
        run: |
          pnpm install --frozen-lockfile
          pnpm test
        env:
          API_URL: http://localhost:8080
          ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}

      - name: Install Playwright browser
        working-directory: e2e
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: E2E UI tests
        working-directory: e2e
        run: pnpm test
        env:
          E2E_BASE_URL: http://localhost:8080
          API_URL: http://localhost:8080
          ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}

      - name: Stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.yaml logs --no-color --tail 300
