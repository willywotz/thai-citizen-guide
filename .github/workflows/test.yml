name: Test

on:
  pull_request:
  push:
    branches: [dev]
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --extra dev
      - run: uv run pytest -q
        env:
          TEST_REDIS_URL: redis://localhost:6379/15

  agent-proxy:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: agent-proxy } }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with: { go-version-file: agent-proxy/go.mod }
      - run: go build ./... && go test ./...

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 11.5.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: pnpm, cache-dependency-path: frontend/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  # Role-access verification: brings up the full stack (production targets, no
  # override) and runs both the blackbox API sweep and the Playwright UI sweep
  # against it. The backend lifespan seeds the default admin + agencies on
  # startup, so no manual bootstrap is needed.
  blackbox-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 11.5.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22 }

      - name: Start app stack
        run: docker compose -f docker-compose.yaml up -d --build --wait --wait-timeout 300
        env:
          EXTERNAL_HTTP_PORT: "8080"

      - name: Wait for admin bootstrap
        run: |
          for i in $(seq 1 30); do
            if curl -fsS -X POST http://localhost:8080/api/v1/auth/login \
                 -H 'Content-Type: application/json' \
                 -d '{"email":"admin@example.com","password":"admin1234"}' >/dev/null 2>&1; then
              echo "admin account ready"; exit 0
            fi
            echo "waiting for admin bootstrap ($i)…"; sleep 5
          done
          echo "::error::admin account never became available"; exit 1

      - name: Blackbox API tests
        working-directory: blackbox
        run: |
          pnpm install --frozen-lockfile
          pnpm test
        env:
          API_URL: http://localhost:8080
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: admin1234
          TEST_USER_PASSWORD: blackbox1234

      - name: Install Playwright browser
        working-directory: e2e
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: E2E UI tests
        working-directory: e2e
        run: pnpm test
        env:
          E2E_BASE_URL: http://localhost:8080
          API_URL: http://localhost:8080
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: admin1234
          TEST_USER_PASSWORD: blackbox1234

      - name: Stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.yaml logs --no-color --tail 300
