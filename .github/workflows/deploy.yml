name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-deploy:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.checker.outputs.deploy }}
    steps:
      - name: Check trigger type and commit message
        id: checker
        env:
          EVENT_NAME: "${{ github.event_name }}"
          COMMIT_MSG: "${{ github.event.head_commit.message }}"
        shell: bash
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual trigger detected. Forcing deployment."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [[ "$COMMIT_MSG" =~ ^deploy ]]; then
            echo "Commit message starts with 'deploy'. Proceeding."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Commit message does not start with 'deploy'. Skipping deployment."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    runs-on: self-hosted
    needs: check-deploy
    if: ${{ needs.check-deploy.outputs.deploy == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Create Production .env File
        run: |
          cat > .env << 'EOF'
          TS_AUTHKEY=${{ secrets.TS_AUTHKEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          EOF

      - name: Deploy Stack
        run: |
          docker compose -f docker-compose.yaml up -d --build --remove-orphans
